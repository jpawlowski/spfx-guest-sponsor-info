# git-cliff configuration
# Generates structured release notes from Conventional Commit messages.
# Used automatically by the release GitHub Actions workflow.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% if version -%}
## What's changed in {{ version | trim_start_matches(pat="v") }}
{% else -%}
## Unreleased
{% endif -%}
{% for g in ["Features", "Bug Fixes", "Performance Improvements", "Internal Improvements", "Dependency Updates"] -%}
{% set section = commits | filter(attribute="group", value=g) -%}
{% if section | length > 0 %}
### {{ g }}
{% for commit in section -%}
- {% if commit.breaking %}💥 **Breaking:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endif -%}
{% endfor %}
"""
footer = """
---
{% if releases.0.version -%}
### Artifacts

| File | Purpose |
|---|---|
| [`guest-sponsor-info.sppkg`](https://github.com/workoho/spfx-guest-sponsor-info/releases/download/{{ releases.0.version }}/guest-sponsor-info.sppkg) | SharePoint web part — upload to App Catalog |
| [`guest-sponsor-info-function.zip`](https://github.com/workoho/spfx-guest-sponsor-info/releases/download/{{ releases.0.version }}/guest-sponsor-info-function.zip) | Azure Function package |
| [`guest-sponsor-info-function-sbom.spdx.json`](https://github.com/workoho/spfx-guest-sponsor-info/releases/download/{{ releases.0.version }}/guest-sponsor-info-function-sbom.spdx.json) | SBOM — SPDX 2.2 (attested) |
| [`guest-sponsor-info-function-sbom.spdx3.json`](https://github.com/workoho/spfx-guest-sponsor-info/releases/download/{{ releases.0.version }}/guest-sponsor-info-function-sbom.spdx3.json) | SBOM — SPDX 3.0 |
| [`guest-sponsor-info-infra.zip`](https://github.com/workoho/spfx-guest-sponsor-info/releases/download/{{ releases.0.version }}/guest-sponsor-info-infra.zip) | Full deployment bundle — Bicep, hooks, and scripts |
| [`checksums.txt`](https://github.com/workoho/spfx-guest-sponsor-info/releases/download/{{ releases.0.version }}/checksums.txt) | SHA256 checksums for all release assets |
| [`install.ps1`](https://github.com/workoho/spfx-guest-sponsor-info/releases/download/{{ releases.0.version }}/install.ps1) | One-liner entry point: downloads the infra bundle and runs the wizard |
| [`install.sh`](https://github.com/workoho/spfx-guest-sponsor-info/releases/download/{{ releases.0.version }}/install.sh) | Shell bootstrapper (macOS / Linux) — installs PowerShell and runs install.ps1 |
| [`setup-graph-permissions.ps1`](https://github.com/workoho/spfx-guest-sponsor-info/releases/download/{{ releases.0.version }}/setup-graph-permissions.ps1) | Assigns Graph permissions (PAW / deferred-rights scenario) |

