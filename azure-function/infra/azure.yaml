# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# Standalone azure.yaml for use with the guest-sponsor-info-infra.zip release package.
# When azd is run from the extracted infra directory, all paths are relative to this file.
#
# For development use from the repository root, see azure.yaml at the root of the
# repository — that file uses the full azure-function/infra/ path prefix.

name: guest-sponsor-info

infra:
  provider: bicep
  path: .
  deploymentStacks:
    actionOnUnmanage:
      resources: delete
      resourceGroups: detach
    denySettings:
      mode: none
      applyToChildScopes: true

hooks:
  # Prepares all Azure-only deploy inputs for direct azd runs: tenant name,
  # deterministic Function App name, EasyAuth App Registration client ID, and
  # Azure-side prerequisite checks.
  preprovision:
    posix:
      shell: sh
      run: hooks/pre-provision.sh
      interactive: true
    windows:
      shell: pwsh
      run: hooks/pre-provision.ps1
      interactive: true

  # Completes the post-Azure Graph-permission phase for direct azd runs,
  # restarts the Function App when needed, and prints the web part
  # configuration values.
  postprovision:
    posix:
      shell: sh
      run: hooks/post-provision.sh
    windows:
      shell: pwsh
      run: hooks/post-provision.ps1
