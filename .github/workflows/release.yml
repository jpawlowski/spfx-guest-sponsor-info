name: Release

# Triggered by SemVer tags, e.g. v1.2.3
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# contents: write  — create the release and upload assets.
# attestations: write — publish artifact attestations to GitHub's attestation store.
# id-token: write    — obtain an OIDC token for Sigstore signing.
# artifact-metadata: write — allow artifact metadata storage records when supported.
permissions:
  contents: write
  attestations: write
  id-token: write
  artifact-metadata: write

# Each tag is unique, so cancellation is not needed.
# The group guard still prevents two releases from running in parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Single job: validate, build, package, and publish in one pass.
  # build.sh already compiles, bundles, tests, and packages — no separate
  # test job needed. Running everything once avoids a double npm ci + double
  # test execution that the previous two-job layout produced.
  release:
    name: Build, package & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Full git history required by git-cliff

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Pin to the major version required by the engines field in package.json.
          node-version: "22"
          cache: "npm"

      # Extract the semver string from the tag (strip the leading "v").
      - name: Extract version
        id: ver
        run: echo "semver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Generate structured release notes from Conventional Commit history.
      # The script reads GIT_CLIFF_VERSION from scripts/release-notes.sh and
      # auto-installs the git-cliff binary on first run — no separate action needed.
      - name: Generate release notes
        env:
          FORCE_COLOR_IN_CI: "1"
        run: ./scripts/release-notes.sh --latest > RELEASE_NOTES.md

      # Stamp the version into package.json and config/package-solution.json.
      - name: Stamp version
        env:
          FORCE_COLOR_IN_CI: "1"
        run: ./scripts/set-version.sh "${{ github.ref_name }}"

      # Full production build: npm ci × 2 (web part + function), compile,
      # bundle, test, and package .sppkg. Tests run here — no separate job needed.
      - name: Build and package
        env:
          FORCE_COLOR_IN_CI: "1"
        run: ./scripts/build.sh

      # build.sh already ran npm ci + build for the Azure Function.
      # Only the ZIP packaging step needs to run here.
      - name: Package Azure Function as ZIP
        working-directory: azure-function
        run: npm run package

      # Bundle the infra package: everything needed to run deploy-azure.ps1
      # locally without cloning the repository. The install.ps1 wrapper
      # downloads this ZIP and runs deploy-azure.ps1 automatically.
      # All files are zipped from within azure-function/infra/ so they land
      # flat at the ZIP root — no azure-function/infra/ path prefix inside.
      - name: Package infra bundle as ZIP
        run: |
          rm -f guest-sponsor-info-infra.zip
          cd azure-function/infra
          zip -r ../../guest-sponsor-info-infra.zip \
            azure.yaml \
            assign-graph-permissions.bicep \
            bicepconfig.json \
            main.bicep \
            main.parameters.json \
            entra-auth.bicep \
            resolve-function-app-name.bicep \
            modules \
            hooks \
            deploy-azure.ps1 \
            install.sh \
            setup-graph-permissions.ps1 \
            assets

      # Generate SPDX SBOMs for the Azure Function package using the
      # Microsoft SBOM Tool (same component-detection library used in Microsoft
      # supply-chain tooling). The SBOM lists all npm dependencies bundled in
      # the deployed ZIP and is consumed by Defender for DevOps and compatible
      # security scanners.
      # NOTE: SBOM_TOOL_VERSION is a binary download — Dependabot cannot track it.
      # Check for new releases manually: https://github.com/microsoft/sbom-tool/releases
      # When bumping SBOM_TOOL_VERSION, update SBOM_TOOL_SHA256 to match:
      #   curl -fsSL <download-url> | sha256sum
      - name: Generate SBOMs for Azure Function (SPDX 2.2 and 3.0)
        env:
          SBOM_TOOL_VERSION: "v4.1.5"
          # SHA256 of sbom-tool-linux-x64 for SBOM_TOOL_VERSION — verify after each bump.
          SBOM_TOOL_SHA256: "bf5d4f99bc98c119d549d08fc02ae92598a7a42772f17317c01031a92632e05b"
        run: |
          mkdir -p "$RUNNER_TEMP/sbom-output"
          curl -fsSLo "$RUNNER_TEMP/sbom-tool" \
            "https://github.com/microsoft/sbom-tool/releases/download/${SBOM_TOOL_VERSION}/sbom-tool-linux-x64"
          echo "${SBOM_TOOL_SHA256}  $RUNNER_TEMP/sbom-tool" | sha256sum --check --strict
          chmod +x "$RUNNER_TEMP/sbom-tool"
          "$RUNNER_TEMP/sbom-tool" generate \
            -b azure-function/dist \
            -bc azure-function \
            -pn guest-sponsor-info-function \
            -pv "${{ steps.ver.outputs.semver }}" \
            -ps Workoho \
            -nsb https://github.com/workoho/spfx-guest-sponsor-info \
            -manifestDirPath "$RUNNER_TEMP/sbom-output"

          "$RUNNER_TEMP/sbom-tool" generate \
            -b azure-function/dist \
            -bc azure-function \
            -pn guest-sponsor-info-function \
            -pv "${{ steps.ver.outputs.semver }}" \
            -ps Workoho \
            -nsb https://github.com/workoho/spfx-guest-sponsor-info \
            -mi SPDX:3.0 \
            -manifestDirPath "$RUNNER_TEMP/sbom-output"

          cp "$RUNNER_TEMP/sbom-output/_manifest/spdx_2.2/manifest.spdx.json" \
            guest-sponsor-info-function-sbom.spdx.json
          cp "$RUNNER_TEMP/sbom-output/_manifest/spdx_3.0/manifest.spdx.json" \
            guest-sponsor-info-function-sbom.spdx3.json

      # Create Sigstore-backed provenance attestations for all release artifacts.
      # This cryptographically proves that each artifact was produced by this
      # GitHub Actions workflow from the tagged commit — not assembled manually.
      # Attestations are stored in GitHub's store, not as release assets.
      # Verify with: gh attestation verify <file> --repo workoho/spfx-guest-sponsor-info
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            sharepoint/solution/guest-sponsor-info.sppkg
            azure-function/released-package.zip
            guest-sponsor-info-infra.zip

      # Attest the SPDX SBOM against the function ZIP so the full dependency
      # tree is cryptographically tied to the artifact it describes.
      # actions/attest auto-detects SPDX/CycloneDX format from sbom-path.
      - name: Attest Function SBOM (SPDX 2.2)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: azure-function/released-package.zip
          sbom-path: guest-sponsor-info-function-sbom.spdx.json

      # Generate a SHA256 checksums file for all release artifacts.
      # Published so deployers and auditors can verify downloads independently.
      # The native Flex OneDeploy path consumes released-package.zip directly.
      # Attestation bundles are stored in GitHub's attestation store and
      # verifiable via: gh attestation verify <file> --repo workoho/spfx-guest-sponsor-info
      - name: Generate checksums
        run: |
          sha256sum \
            sharepoint/solution/guest-sponsor-info.sppkg \
            azure-function/released-package.zip \
            guest-sponsor-info-function-sbom.spdx.json \
            guest-sponsor-info-function-sbom.spdx3.json \
            guest-sponsor-info-infra.zip \
            azure-function/infra/install.ps1 \
            azure-function/infra/install.sh \
            azure-function/infra/setup-graph-permissions.ps1 \
          | awk '{ n=split($2,a,"/"); print $1 "  " a[n] }' > checksums.txt

      # Create or update the GitHub Release and attach build artifacts.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.ver.outputs.semver }}
          body_path: RELEASE_NOTES.md
          files: |
            sharepoint/solution/guest-sponsor-info.sppkg
            azure-function/released-package.zip
            guest-sponsor-info-function-sbom.spdx.json
            guest-sponsor-info-function-sbom.spdx3.json
            guest-sponsor-info-infra.zip
            checksums.txt
            azure-function/infra/install.ps1
            azure-function/infra/install.sh
            azure-function/infra/setup-graph-permissions.ps1
