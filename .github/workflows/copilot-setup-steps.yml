# Setup steps that GitHub Copilot's coding agent runs before starting work.
# This file is NOT a devcontainer — it runs in a GitHub Actions sandbox.
# See: https://docs.github.com/en/copilot/how-tos/agents/copilot-coding-agent/customizing-the-development-environment-for-copilot-coding-agent
name: "Copilot Setup Steps"

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Stay within the range declared in package.json `engines`.
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
