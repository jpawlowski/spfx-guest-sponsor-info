  <path d="M30 58 C30 50 58 50 58 58 Z" fill="#C7E0F4" stroke="#0078D4" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Connecting lines (dashed, lighter blue) -->
  <line x1="76" y1="46" x2="140" y2="26" stroke="#C7E0F4" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="76" y1="58" x2="140" y2="78" stroke="#C7E0F4" stroke-width="2" stroke-dasharray="5 3"/>
