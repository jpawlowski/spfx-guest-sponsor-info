# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: guest-sponsor-info

infra:
  provider: bicep
  path: azure-function/infra
  deploymentStacks:
    actionOnUnmanage:
      resources: delete
      resourceGroups: detach
    denySettings:
      mode: none
      applyToChildScopes: true

hooks:
  # Prepares all Azure-only deploy inputs for direct azd runs: tenant name,
  # deterministic Function App name, EasyAuth App Registration client ID, and
  # Azure-side prerequisite checks.
  preprovision:
    posix:
      shell: sh
      run: azure-function/infra/hooks/pre-provision.sh
      interactive: true
    windows:
      shell: pwsh
      run: azure-function/infra/hooks/pre-provision.ps1
      interactive: true

  # Completes the post-Azure Graph-permission phase for direct azd runs,
  # restarts the Function App when needed, and prints the web part
  # configuration values.
  postprovision:
    posix:
      shell: sh
      run: azure-function/infra/hooks/post-provision.sh
    windows:
      shell: pwsh
      run: azure-function/infra/hooks/post-provision.ps1
